# ---------------------------
# ENV
# ---------------------------
env: "dev"

# ---------------------------
# STORAGE
# ---------------------------
base_path: "abfss://historicaldata@sgmavenmarket.dfs.core.windows.net"

# ---------------------------
# CATALOG (ENV-AWARE)
# ---------------------------
catalog: "maven_market_uc"
catalog_prod: "maven_market_prod_uc"

# ---------------------------
# SCHEMAS
# ---------------------------
bronze_schema: "bronze"
silver_schema: "silver"
gold_schema: "gold"
audit_schema: "audit"

# ---------------------------
# TABLE NAMES (BRONZE)
# ---------------------------
bronze_transactions: "bronze_raw_transactions"
bronze_returns: "bronze_raw_returns"
bronze_stores: "bronze_raw_stores"
bronze_regions: "bronze_raw_regions"
bronze_calendar: "bronze_raw_calendar"
bronze_customers: "bronze_customers"
bronze_products: "bronze_products"
bronze_orders: "bronze_raw_orders"
bronze_inventory: "bronze_raw_inventory"

# ---------------------------
# PATHS (RELATIVE)
# ---------------------------
transactions_path: "/transactions/"
returns_path: "/returns/"
stores_path: "/stores/"
regions_path: "/regions/"
calendar_path: "/calendar/"

# ---------------------------
# CHECKPOINTS
# ---------------------------
transactions_checkpoint: "/checkpoints/transactions/"
returns_checkpoint: "/checkpoints/returns/"
stores_checkpoint: "/checkpoints/stores/"
regions_checkpoint: "/checkpoints/regions/"
calendar_checkpoint: "/checkpoints/calendar/"

# ---------------------------
# KAFKA CONFIG
# ---------------------------
kafka_scope: "mongo-kafka-connector"
kafka_bootstrap_key: "kafka-bootstrap"
kafka_api_key_name: "kafka-api-key"
kafka_api_secret_name: "kafka-api-secret"

orders_topic: "orders"
inventory_topic: "inventory"

# ---------------------------
# INGESTION SOURCE (STAGE 2/4)
# ---------------------------
transactions_source: "adls"
returns_source: "adls"
stores_source: "adls"
regions_source: "adls"
calendar_source: "adls"

customers_source: "mongodb"
products_source: "mongodb"

orders_source: "kafka"
inventory_source: "kafka"

# ---------------------------
# PRIMARY KEYS (CRITICAL)
# ---------------------------
customers_pk: "customer_id"
products_pk: "product_id"
stores_pk: "store_id"
transactions_pk: "transaction_id"
returns_pk: "return_id"

# ---------------------------
# SCD TYPE 2 CONFIG
# ---------------------------
customers_scd_columns:
  - customer_name

products_scd_columns:
  - product_name

stores_scd_columns:
  - store_name
  - region_id

# ---------------------------
# FOREIGN KEY RELATIONSHIPS
# ---------------------------
fk_transactions: "product_id,customer_id,store_id"
fk_returns: "product_id,store_id"
fk_stores: "region_id"
fk_orders: "customer_id"
fk_inventory: "product_id"

# ---------------------------
# RECORD STATUS STANDARDIZATION
# ---------------------------
record_status_valid: "valid"
record_status_invalid: "invalid"
record_status_quarantined: "quarantined"
record_status_cleaned: "cleaned"

# ---------------------------
# FAILURE TYPES (QUARANTINE)
# ---------------------------
failure_expectation: "expectation_failure"
failure_fk: "fk_failure"
failure_schema: "schema_error"

# ---------------------------
# DEFAULT VALUES (SAFETY)
# ---------------------------
default_ingestion_source_adls: "adls"
default_ingestion_source_kafka: "kafka"
default_ingestion_source_mongo: "mongodb"

default_record_status: "cleaned"

# ---------------------------
# AUDIT & LOGGING
# ---------------------------
pipeline_name: "maven_market_pipeline"

audit_table: "audit_logs"
dq_metrics_table: "data_quality_metrics"
schema_drift_table: "schema_drift_logs"
consistency_table: "cross_table_checks"

enable_audit_logging: true
enable_dq_metrics: true
enable_schema_drift: true
enable_cross_table_checks: true

# ---------------------------
# SILVER TABLE LIST (OPTIONAL BUT USEFUL)
# ---------------------------
silver_tables: "silver_transactions,silver_returns,silver_stores,silver_regions,silver_calendar,silver_customers,silver_products,silver_dim_customers,silver_dim_products,silver_dim_stores"

