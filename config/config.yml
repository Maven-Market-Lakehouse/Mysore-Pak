project:
  name: maven-market-lakehouse
  environment: main
  owner_team: data-engineering

databricks:
  host: https://adb-<workspace-id>.<region>.azuredatabricks.net
  workspace_root: /Workspace/Shared/maven-market-lakehouse
  secret_scope: maven-market-kv-scope

unity_catalog:
  catalog: maven_market_uc
  schemas:
    bronze: bronze
    silver: silver
    gold: gold
    audit: audit
  groups:
    data_engineers: grp_data_engineers
    analysts: grp_analysts
    regional_managers: grp_regional_managers
    admins: grp_data_platform_admins

storage:
  adls:
    raw_base_path: abfss://raw@<storage-account>.dfs.core.windows.net/maven_market

sources:
  csv:
    format: csv
    options:
      header: true
      inferSchema: false
      rescueDataColumn: _rescued_data
    datasets:
      transactions:
        source_path: ${storage.adls.raw_base_path}/transactions
        schema: transaction_id STRING, customer_id STRING, product_id STRING, store_id STRING, quantity INT, unit_price DECIMAL(10,2), transaction_ts TIMESTAMP
        target_table: maven_market_uc.bronze.transactions_bronze
      customers:
        source_path: ${storage.adls.raw_base_path}/customers
        schema: customer_id STRING, first_name STRING, last_name STRING, email STRING, region_id STRING, updated_at TIMESTAMP
        target_table: maven_market_uc.bronze.customers_bronze
      regions:
        source_path: ${storage.adls.raw_base_path}/regions
        schema: region_id STRING, region_name STRING, country STRING
        target_table: maven_market_uc.bronze.regions_bronze

  mongodb:
    format: mongodb
    options:
      spark.mongodb.read.connection.uri: mongodb+srv://${secrets.mongo-username}:${secrets.mongo-password}@<cluster-url>/admin
      spark.mongodb.read.database: maven_market
      spark.mongodb.read.collection: products
    target_table: maven_market_uc.bronze.products_bronze

  kafka:
    format: kafka
    options:
      kafka.bootstrap.servers: <bootstrap-server>:9092
      subscribe: orders,inventory
      startingOffsets: latest
      failOnDataLoss: false
      kafka.security.protocol: SASL_SSL
      kafka.sasl.mechanism: PLAIN
      kafka.sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${secrets.kafka-username}' password='${secrets.kafka-password}';
    target_table: maven_market_uc.bronze.kafka_events_bronze

dlt:
  pipeline_name: maven_market_dlt
  continuous: true
  expectations:
    valid_quantity: quantity > 0
    valid_price: unit_price >= 0

tables:
  silver:
    transactions: maven_market_uc.silver.transactions_silver
    customers: maven_market_uc.silver.customers_silver
    products: maven_market_uc.silver.products_silver
    inventory_events: maven_market_uc.silver.inventory_events_silver
  gold:
    fact_sales: maven_market_uc.gold.fact_sales
    dim_customer: maven_market_uc.gold.dim_customer
    dim_product: maven_market_uc.gold.dim_product
    dim_store: maven_market_uc.gold.dim_store

logging:
  level: INFO
  audit_table: maven_market_uc.audit.audit_logs
  app_name: maven_market_lakehouse

cluster_policy:
  name: maven-market-cost-governance
  max_workers: 2
  autotermination_minutes: 30
  node_type_allowlist:
    - Standard_F4s_v2
    - Standard_D4s_v5
