bundle:
  name: maven-market-lakehouse

variables:
  workspace_root:
    default: /Workspace/Shared/maven-market-lakehouse

resources:
  pipelines:
    maven_market_medallion_pipeline:
      name: maven-market-medallion

      catalog: maven_market_uc
      target: bronze

      photon: false
      continuous: false
      development: true
      # channel: CURRENT

      serverless: true

      configuration:
        config.path: ${workspace.file_path}/config/config.yml

      libraries:
        - notebook:
            path: ./src/dlt/01_Bronze_Pipeline/1_BRONZE_ADLS_INGESTION.py
        - notebook:
            path: ./src/dlt/01_Bronze_Pipeline/2_BRONZE_MONGO_INGESTION.py
        - notebook:
            path: ./src/dlt/01_Bronze_Pipeline/3_BRONZE_KAFKA_INGESTION.py

        - notebook:
            path: ./src/dlt/02_Silver_Pipeline/1_SILVER_ADLS.py
        - notebook:
            path: ./src/dlt/02_Silver_Pipeline/2_SILVER_KAFKA.py
        - notebook:
            path: ./src/dlt/02_Silver_Pipeline/3_SILVER_MONGO.py
        - notebook:
            path: ./src/dlt/03_Gold_Pipeline/Gold(Neha).py

      run_as:
        user_name: capstone.maven.market@gmail.com

targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405608624846971.11.azuredatabricks.net/
      root_path: ~/maven-market-lakehouse


